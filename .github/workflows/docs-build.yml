name: docs-build

on:
  push:
    branches: [main]
    paths:
      - "packages/nova-docs/**"
  pull_request:
    paths:
      - "packages/nova-docs/**"
  workflow_dispatch:

jobs:
  build:
    name: Build docs site
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build site
        run: bun run --filter @novacode/nova-docs build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_API_KEY }}

      - name: Run tests
        run: bun run --filter @novacode/nova-docs test
